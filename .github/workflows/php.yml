name: Pruebas PHP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Dar permisos de escritura a la carpeta datos
      run: chmod -R 777 datos/

    - name: Ejecutar Pruebas Unitarias Propias
      run: php pruebas/test.php
